<svg xmlns="http://www.w3.org/2000/svg" width="968" height="488" viewBox="0 0 968 488" font-family="'JetBrains Mono','Fira Code','SFMono-Regular',Consolas,'Liberation Mono',monospace" font-size="14">
<style>
  :root{--bg:#0d1117;--brd:#1f2630;--dim:#4a5261;--txt:#c9d1d9;--acc:#00d4a0;--hi:#e3a857;--art1:#00d4a0;--art2:#2f7f6c;--ring:#e8e8e8}
  @media (prefers-color-scheme: light){
    :root{--bg:#ffffff;--brd:#d8dee4;--dim:#8c959f;--txt:#24292f;--acc:#087f5b;--hi:#b8860b;--art1:#0b9c7d;--art2:#7fb3a6;--ring:#24292f}
  }
  text{white-space:pre}
  .dim{fill:var(--dim)} .txt{fill:var(--txt)} .acc{fill:var(--acc)} .hi{fill:var(--hi)}
  .a1{fill:var(--art1)} .a2{fill:var(--art2)} .ring{fill:var(--ring)}
  .ln{opacity:0;animation:fade .38s ease forwards}
  @keyframes fade{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:none}}
  .cur{animation:blink 1.15s step-end infinite;animation-delay:2.6s;opacity:0}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
</style>
